<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestFinder — Discover the Best Restaurants Near You</title>
  <meta name="description" content="Find and rate the best restaurants in town. Search by name, cuisine, rating, or proximity. A modern restaurant discovery experience." />
  <meta name="author" content="Seif Mejri" />
  <meta property="og:title" content="RestFinder — Restaurant Discovery App" />
  <meta property="og:description" content="Discover, search, and rate the best restaurants near you." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <a class="logo" href="#">
      <span class="logo-icon">🍴</span>
      <span class="logo-text">RestFinder</span>
    </a>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-badge">🔥 Discover local flavors</div>
    <h1>Find the <span class="gradient-text">Best Restaurants</span> in Town</h1>
    <p>Search by name, cuisine, or rating. Explore nearby restaurants and share your opinion with likes and reviews.</p>

    <!-- Search -->
    <div class="search-container">
      <input
        type="search"
        class="search-bar"
        id="searchInput"
        placeholder="Search restaurants, cuisines..."
        aria-label="Search restaurants"
      />
      <span class="search-icon">🔍</span>
    </div>
  </section>

  <!-- Filters -->
  <div class="filters" id="specialtyFilters">
    <!-- Generated by JS -->
  </div>

  <div class="filters">
    <div class="rating-filter">
      <label>Rating:</label>
      <div id="starFilter">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- Location Banner -->
  <div class="location-banner" id="locationBanner">
    <div class="location-banner-inner">
      <span class="location-text">📍 Enable location for distance-based sorting</span>
      <button id="enableLocation">Enable</button>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <span class="results-count" id="resultsCount">Showing <span>0</span> restaurants</span>
    <select class="sort-select" id="sortSelect" aria-label="Sort restaurants">
      <option value="name">Sort by Name</option>
      <option value="rating">Sort by Rating</option>
      <option value="likes">Sort by Popularity</option>
      <option value="distance" id="sortDistance" disabled>Sort by Distance</option>
    </select>
  </div>

  <!-- Cards Grid -->
  <main class="cards-grid" id="cardsGrid">
    <!-- Generated by JS -->
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>
      Built by <a href="https://github.com/seifedd" target="_blank" rel="noopener">Seif Mejri</a> •
      <a href="https://github.com/seifedd/Rest-Mobile-App" target="_blank" rel="noopener">View Source</a>
    </p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
